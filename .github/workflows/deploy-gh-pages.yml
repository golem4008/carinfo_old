name: 自动打包并部署到GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 修复：移除cache配置，避免锁文件检查
      - name: 安装Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'  # 自动匹配最新LTS版本
          check-latest: true     # 避免版本兼容问题

      # 可选：配置国内镜像源，加速依赖安装
      - name: 配置npm国内镜像源
        run: npm config set registry https://registry.npmmirror.com

      - name: 安装项目依赖
        run: npm install

      # Vite项目用dist，CRA项目改build
      - name: 打包项目
        run: npm run build

      - name: 创建.nojekyll文件
        run: touch dist/.nojekyll  # CRA改build/.nojekyll

      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # CRA改build
          publish_branch: gh-pages
          force_orphan: true
