# 【必看注释】：这是Action的核心配置文件，只需修改标注「需自定义」的部分

# 1. 工作流名称（可自定义，比如“自动打包部署React项目”）
name: 自动打包并部署到GitHub Pages

# 2. 触发条件：推送到指定分支时执行（需自定义：改为你的分支名，比如main/dev）
on:
  push:
    branches: [ main ]  # 若你的分支是master，改为master

# 3. 定义要执行的任务
jobs:
  build-and-deploy:
    # 运行环境：Ubuntu最新版（无需修改）
    runs-on: ubuntu-latest

    # 任务步骤（按顺序执行）
    steps:
      # 步骤1：拉取GitHub仓库的代码到Action服务器
      - name: 拉取仓库代码
        uses: actions/checkout@v4  # 使用官方的拉取代码插件

      # 步骤2：安装Node.js（需自定义：改为你项目的Node版本，比如18/20，本地执行node -v查看）
      - name: 安装Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'       # 匹配本地Node版本，避免依赖兼容问题
          cache: 'npm'             # 缓存npm依赖，加速下次构建

      # 步骤3：安装项目依赖（无需修改）
      - name: 安装项目依赖
        run: npm install           # 若你用yarn，改为yarn install

      # 步骤4：执行打包命令（Vite项目打包生成dist文件夹，无需修改）
      - name: 打包项目（Vite）
        run: npm run build

      # 步骤5：创建.nojekyll文件（避免Jekyll忽略下划线文件夹，无需修改）
      - name: 创建.nojekyll文件
        run: touch dist/.nojekyll  # Vite的产物在dist，CRA需改为build/.nojekyll

      # 步骤6：部署打包后的文件到GitHub Pages（核心步骤，无需修改）
      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # 官方推荐的Pages部署插件
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动生成的Token，无需手动配置
          publish_dir: ./dist                       # Vite产物目录，CRA需改为./build
          publish_branch: gh-pages                  # 部署到gh-pages分支（自动创建，无需提前建）
          force_orphan: true                        # 清空gh-pages分支旧内容，避免冲突
